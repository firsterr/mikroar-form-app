<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MikroAR – Anket Oluştur / Düzenle</title>
  <style>
    :root{ --bg:#0b1220; --panel:#101826; --line:#1f2a38; --text:#dbe3f1; --muted:#8aa1bf; --btn:#4169e1; }
    *{box-sizing:border-box}
    body{margin:0; background:var(--bg); color:var(--text); font:15px/1.4 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;}
    .wrap{max-width:980px; margin:24px auto; padding:0 16px}
    h1{margin:.2em 0 14px; font-size:28px}
    .panel{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; margin:14px 0}
    label.small{display:block; color:var(--muted); font-size:13px; margin-bottom:6px}
    input[type=text], select, textarea{
      width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; background:#0f1422; color:var(--text);
    }
    textarea{min-height:92px; resize:vertical}
    .row{display:flex; gap:10px; align-items:center}
    .row > *{flex:1}
    .muted{color:var(--muted)}
    .btn{padding:10px 14px; border:1px solid #2a3a55; background:#14213a; color:#dce6ff; border-radius:10px; cursor:pointer}
    .btn.primary{background:var(--btn); border-color:#385ccc}
    .chip{display:inline-block; padding:4px 8px; border:1px solid var(--line); border-radius:999px; margin-right:6px; color:var(--muted)}
    .q{border:1px dashed var(--line); border-radius:12px; padding:12px; margin-top:12px}
    .qhead{display:flex; gap:8px; align-items:center; margin-bottom:8px}
    .qopts{width:100%}
    #toast{display:none; position:fixed; right:14px; bottom:14px; padding:10px 12px; background:#0b1220; border:1px solid #2a3a55; color:#e7efff; border-radius:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>MikroAR • Anket Oluştur / Düzenle</h1>
    <div class="muted">“Yükle” mevcut formu getirir; düzenleyip “Kaydet” dersen üzerine yazar.</div>

    <div class="panel">
      <div class="row">
        <div>
          <label class="small">Slug</label>
          <input id="slug" type="text" placeholder="ör. formayvalik" />
        </div>
        <div style="max-width:160px">
          <label class="small">Durum</label>
          <select id="active">
            <option value="true">Aktif</option>
            <option value="false">Pasif</option>
          </select>
        </div>
      </div>

      <div style="margin-top:10px">
        <label class="small">Başlık</label>
        <input id="title" type="text" placeholder="Anket başlığı" />
      </div>

      <div class="row" style="margin-top:10px">
        <div>
          <label class="small">Açıklama (opsiyonel – başlık altına çıkar)</label>
          <textarea id="desc" placeholder="Kısa açıklama veya KVKK notu..."></textarea>
        </div>
        <div>
          <label class="small">KVKK Uyarısı (opsiyonel)</label>
          <textarea id="kvkk" placeholder="KVKK bilgilendirmesi..."></textarea>
        </div>
      </div>

      <div style="display:flex; gap:8px; margin-top:10px">
        <button id="btnLoad" class="btn">Yükle</button>
        <button id="btnNew"  class="btn">Yeni (sıfır)</button>
        <button id="btnAdd"  class="btn">+ Soru Ekle</button>
        <div id="meta" style="margin-left:auto"></div>
        <button id="btnSave" class="btn primary">Kaydet</button>
      </div>
    </div>

    <div id="qs" class="panel"></div>
  </div>

  <div id="toast"></div>

  <script src="/admin.js" defer></script>
</body>
</html>

<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MikroAR – Anket Oluştur</title>
<style>
  :root{--line:#e5e7eb;--ink:#111827}
  *{box-sizing:border-box} body{margin:0;font:15px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);background:#f7f7f8}
  .wrap{max-width:980px;margin:24px auto;padding:0 16px}
  h1{margin:8px 0 16px;font-size:22px}
  .row{display:grid;grid-template-columns:140px 1fr;gap:10px;align-items:center;margin:8px 0}
  input[type=text], textarea, select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:#fff}
  textarea{min-height:80px;resize:vertical}
  .bar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
  .btn{padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer}
  .btn.primary{background:#1a73e8;color:#fff;border-color:#1a73e8}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
  .chip{border:1px solid var(--line);border-radius:999px;padding:4px 10px;color:#374151;background:#fff}
  #qs{margin-top:14px}
  .q{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0}
  .qhead{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .q .btn{padding:6px 10px}
  .opts{margin-top:8px}
  .hint{color:#6b7280;font-size:12px;margin-top:4px}
  .toast{display:none;margin-top:8px;border:1px solid var(--line);border-radius:8px;padding:8px 12px;background:#fff}
</style>
</head>
<body>
<div class="wrap">
  <h1>🛠️ Anket Oluştur / Düzenle</h1>

  <div class="row">
    <label for="slug">Slug</label>
    <input id="slug" type="text" placeholder="ör. formayvalik">
  </div>

  <div class="row">
    <label for="title">Başlık</label>
    <input id="title" type="text" placeholder="ör. Ayvalık Genel Değerlendirme">
  </div>

  <div class="row">
    <label for="desc">Açıklama</label>
    <textarea id="desc" placeholder="Başlığın altında görünecek kısa açıklama (opsiyonel)"></textarea>
  </div>

  <div class="row">
    <label for="active">Durum</label>
    <select id="active">
      <option value="true">Aktif</option>
      <option value="false">Pasif</option>
    </select>
  </div>

  <div class="bar">
    <button id="btnLoad" class="btn">Yükle</button>
    <button id="btnNew"  class="btn">Yeni</button>
    <button id="btnAdd"  class="btn">Soru ekle</button>
    <button id="btnSave" class="btn primary">Kaydet</button>
  </div>

  <div id="meta" class="meta"></div>
  <div id="qs"></div>

  <div id="toast" class="toast"></div>
</div>

<script src="/admin.js?v=desc1"></script>
</body>
</html>

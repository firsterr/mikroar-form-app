<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Anket</title>

  <!-- Google Forms benzeri, sade ve güvenli stiller (İNLINE) -->
  <style>
    :root{
      --bg:#f1f3f4;
      --card:#fff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --brand:#1a73e8;
      --brand-600:#1664c7;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      color:var(--text);
      background:var(--bg);
    }
    .wrap{
      max-width:860px;
      margin:28px auto 64px;
      padding:0 16px;
    }
    h1{
      margin:0 0 8px;
      font-size:clamp(22px,4.5vw,36px);
      line-height:1.15;
      letter-spacing:-.02em;
    }
    #form-desc{
      margin:0 0 18px;
      color:var(--muted);
    }

    /* Soru kutuları */
    .qBox{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:18px 16px;
      margin:18px 0;
      box-shadow:0 1px 0 rgba(0,0,0,.02);
    }
    .qBox label.qtitle{
      display:block;
      font-weight:600;
      margin-bottom:10px;
    }

    /* Seçenek satırı */
    .opt{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      border:1px solid transparent;
      border-radius:10px;
      transition:background .15s ease, border-color .15s ease, box-shadow .15s ease;
      cursor:pointer;
      user-select:none;
    }
    .opt + .opt{ margin-top:6px; }
    .opt input{ flex:0 0 auto; width:18px; height:18px; }
    /* Seçilince ufak vurgu */
    .opt.checked{
      background:#eef3fe;
      border-color:#dbe8ff;
      box-shadow:inset 0 0 0 1px rgba(26,115,232,.15);
    }

    /* Kısa/uzun metin */
    .qBox input[type="text"], .qBox textarea{
      width:100%; border:1px solid var(--line);
      border-radius:10px; padding:10px 12px; outline:none;
      background:#fff;
      transition: box-shadow .15s ease, border-color .15s ease;
    }
    .qBox textarea{min-height:96px; resize:vertical}
    .qBox input:focus, .qBox textarea:focus{
      border-color:#cfe0ff; box-shadow:0 0 0 3px rgba(26,115,232,.15);
    }

    /* Yapışkan gönder alanı */
    .sticky-area{
      position:sticky; bottom:0; z-index:50;
      margin-top:22px;
      padding:12px 10px 16px;
      background:rgba(255,255,255,.92);
      backdrop-filter:saturate(180%) blur(6px);
      border-top:1px solid var(--line);
      border-radius:12px 12px 0 0;
      text-align:center;
    }
    #btnSend{
      display:inline-block;
      min-width:140px;
      padding:10px 16px;
      border:0; border-radius:10px;
      background:var(--brand); color:#fff; font-weight:700;
      box-shadow:0 2px 0 rgba(0,0,0,.08);
      cursor:pointer;
      transition: transform .05s ease, background .15s ease;
    }
    #btnSend:hover{ background:var(--brand-600); }
    #btnSend:active{ transform:translateY(1px); }
    #btnSend:disabled{ opacity:.6; cursor:default }

    .note{
      margin-top:10px; font-size:13px; line-height:1.35; color:#374151;
    }
    .note a{ color:var(--brand); text-decoration:underline }

    /* “anket kapalı” kutusu */
    .callout{
      margin:18px 0; padding:16px 14px;
      background:#fff4f4; color:#991b1b;
      border:1px solid #fecaca; border-radius:12px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1 id="form-title">Anket</h1>
    <p id="form-desc" hidden></p>

    <!-- Uyarı alanı (kapalı / hata vb.) -->
    <div id="callout" class="callout" hidden></div>

    <!-- Sorular buraya render edilecek -->
    <form id="f" novalidate></form>

    <!-- Yapışkan gönder+bilgi alanı -->
    <div class="sticky-area" id="sticky" hidden>
      <button type="submit" id="btnSend" form="f">Gönder</button>
      <div class="note">
        Bu form <strong>mikroar.com</strong> alanında oluşturulmuştur. –
        <a href="mailto:iletisim@mikroar.com">iletisim@mikroar.com</a><br/>
        <strong>MikroAR Araştırma</strong>
      </div>
    </div>
  </div>

  <script src="/form.js" defer></script>
</body>
</html>

<!doctype html>
<html lang="tr">
<head>
  <!-- form.html <head> içine ya da mevcut CSS dosyana ekle -->
<style>
 /* ==== Google Forms'e yakın düzen ==== */

/* sayfa */
body {
  background:#f1f3f4;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  color:#1f1f1f;
}

/* sayfa genişlik ve kenar boşlukları */
.container,
main,
#f {
  max-width: 770px;
  margin: 24px auto;
}

/* form başlığı */
#form-title {
  font-size: 42px;
  line-height: 1.12;
  font-weight: 700;
  letter-spacing: -.3px;
  margin: 16px auto 8px;
}

/* soru kartı */
.q {
  background:#fff;
  border-radius: 12px;
  padding: 20px 24px;
  margin: 16px 0;
  box-shadow: 0 1px 2px rgba(0,0,0,.08), 0 2px 8px rgba(0,0,0,.06);
  border:1px solid rgba(0,0,0,.06);
}

/* soru etiketi */
.q > label:first-child {
  display:block;
  font-size:18px;
  line-height:1.35;
  font-weight:600;
  margin:4px 0 12px;
  color:#202124;
}

/* seçenek satırı */
.q .opt {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:10px;
  cursor:pointer;
  position:relative;
}

/* fare ile üzerine gelince hafif vurgulama */
.q .opt:hover {
  background: rgba(26,115,232,.06);
}

/* seçili olunca vurgulu arkaplan */
.q .opt:has(input:checked) {
  background: rgba(26,115,232,.10);
}

/* “ripple” – tamamen CSS ile */
.q .opt::after {
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle at var(--rx,50%) var(--ry,50%), rgba(26,115,232,.18), transparent 60%);
  opacity:0;
  transform: scale(0.6);
  border-radius:inherit;
  pointer-events:none;
  transition: opacity .5s, transform .5s;
}
.q .opt:has(input:checked)::after {
  opacity:1;
  transform: scale(1);
}

/* giriş elemanları */
.q input[type="radio"],
.q input[type="checkbox"] {
  width:18px; height:18px;
}

/* zorunlu yıldız */
.required,
label[for][data-required="true"]::after {
  content:" *";
  color:#d93025;
}

/* “Gönder” çubuğu – mobilde sticky, masaüstünde normal */
.sticky-submit {
  display:flex; align-items:center; justify-content:space-between;
  gap:16px; padding:12px 16px; margin-top:12px;
  background:#fff; border:1px solid rgba(0,0,0,.06);
  border-radius:12px; box-shadow: 0 1px 2px rgba(0,0,0,.08);
}
.sticky-submit .note {
  font-size:14px; color:#5f6368;
}
.sticky-submit .note b { color:#202124; }
#btnSend {
  background:#1a73e8; color:#fff; border:none; border-radius:24px;
  padding:10px 22px; font-weight:600; letter-spacing:.2px;
}
#btnSend:hover { filter:brightness(.96); }

/* sadece dar ekranlarda yapışkan */
@media (max-width: 768px) {
  .sticky-submit {
    position:sticky; bottom:8px; z-index:5;
  }
  /* altta butonla çakışmaması için ekstra boşluk */
  #f { padding-bottom: 64px; }
}

/* sayfanın genel yan boşlukları */
@media (min-width: 1024px) {
  .container, main, #f { margin: 32px auto; }
}
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;:#0b1220;color:#e6e6e6;margin:0}
    .wrap{max-width:960px;margin:40px auto;padding:0 16px}
    h1{font-size:40px;margin:0 0 24px}
    .card{background:#111a2b;border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
    .q{margin:16px 0;padding:16px;border:1px solid #21304c;border-radius:12px}
    label{display:block;margin:8px 0}
    input[type=text]{width:100%;background:#0d1424;color:#fff;border:1px solid #21304c;border-radius:10px;padding:12px 14px;font-size:16px}
    button{background:#2f6feb;color:#fff;border:0;border-radius:10px;padding:12px 18px;font-size:16px;cursor:pointer}
    .muted{opacity:.75}
    .toast{margin:10px 0;padding:12px;border-radius:10px}
    .ok{background:#12361d;color:#b9f6c0}
    .warn{background:#3c2a16;color:#ffd7a1}
    .err{background:#3c171c;color:#ffc0c9}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="title">Yükleniyor…</h1>
    <div class="card">
      <p class="muted">Bu anket kapsamında herhangi bir kişisel veriniz alınmamakta ve üçüncü kişilerle paylaşılmamaktadır. Yanıtlarınız tamamen anonim olarak değerlendirilecektir.</p>
      <div id="toast"></div>
      <form id="frm">
        <div id="questions"></div>
        <div style="margin-top:16px">
          <button id="btnSend" type="submit">Gönder</button>
        </div>
      </form>
    </div>
  </div>

  <script>
  const qs = (s)=>document.querySelector(s);
  const $title = qs('#title');
  const $questions = qs('#questions');
  const $toast = qs('#toast');
  const $frm = qs('#frm');
  const $btn = qs('#btnSend');

  function toast(msg, cls='ok'){
    $toast.innerHTML = msg ? `<div class="toast ${cls}">${msg}</div>` : '';
  }
  function disableForm(){
    $btn.disabled = true;
    $btn.textContent = 'Gönderildi';
    [...$frm.querySelectorAll('input,textarea,button')].forEach(el=>el.disabled=true);
  }

  function getSlug(){
    const u = new URL(location.href);
    return u.searchParams.get('slug');
  }

  function parseSchema(raw){
    let s = raw;
    if (typeof s === 'string'){
      try{ s = JSON.parse(s); }catch(e){ s = {}; }
    }
    if (s && s.schema && !s.questions) s = s.schema;
    return s && Array.isArray(s.questions) ? s : { questions: [] };
  }

  function renderQuestions(schema){
    const items = schema.questions || [];
    if(!items.length){
      $questions.innerHTML = '<p class="muted">Bu formda soru bulunamadı.</p>';
      return;
    }
    $questions.innerHTML = '';
    items.forEach((q, idx)=>{
      const wrap = document.createElement('div');
      wrap.className = 'q';
      const label = document.createElement('div');
      label.style.fontWeight = '600';
      label.style.marginBottom = '8px';
      label.innerHTML = `${idx+1}. ${q.label || q.text || 'Soru'} ${q.required ? '<span class="muted">*</span>':''}`;
      wrap.appendChild(label);

      const name = `q_${idx}`;

      if(q.type === 'radio'){
        (q.options || []).forEach(opt=>{
          wrap.insertAdjacentHTML('beforeend',
            `<label><input type="radio" name="${name}" value="${opt}"> ${opt}</label>`);
        });
      }else if(q.type === 'checkbox'){
        (q.options || []).forEach(opt=>{
          wrap.insertAdjacentHTML('beforeend',
            `<label><input type="checkbox" name="${name}" value="${opt}"> ${opt}</label>`);
        });
      }else{
        wrap.insertAdjacentHTML('beforeend',
          `<input type="text" name="${name}" placeholder="Yanıtınız">`);
      }
      $questions.appendChild(wrap);
    });
  }

  async function loadForm(){
    const slug = getSlug();
    if(!slug){ toast('Geçersiz bağlantı (slug yok).', 'err'); return; }
    try{
      const r = await fetch(`/api/forms/${encodeURIComponent(slug)}`);
      const data = await r.json();
      if(!r.ok || data.ok === false) throw new Error(data.error || 'Form alınamadı');

      $title.textContent = data.form.title || slug;

      const schema = parseSchema(data.form.schema);
      renderQuestions(schema);

      $frm.onsubmit = async (ev)=>{
        ev.preventDefault();
        const fd = new FormData($frm);
        const answers = {};
        for(const [k,v] of fd.entries()){
          if(k in answers){
            if(Array.isArray(answers[k])) answers[k].push(v);
            else answers[k] = [answers[k], v];
          }else{
            const el = $frm.querySelectorAll(`[name="${k}"][type="checkbox"]`);
            if(el.length>1){
              const arr = [...el].filter(x=>x.checked).map(x=>x.value);
              answers[k] = arr;
            }else{
              answers[k] = v;
            }
          }
        }

        const requiredMiss = (schema.questions||[]).some((q,idx)=>{
          if(!q.required) return false;
          const key = `q_${idx}`;
          const val = answers[key];
          return val==null || (Array.isArray(val) && val.length===0) || (typeof val==='string' && !val.trim());
        });
        if(requiredMiss){ toast('Lütfen zorunlu soruları doldurun.', 'warn'); return; }

        try{
          const rr = await fetch(`/api/forms/${encodeURIComponent(slug)}/submit`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ answers })
          });
          const res = await rr.json();
          if(!rr.ok || res.ok===false) throw new Error(res.error || 'Gönderim hatası');

          if(res.alreadySubmitted){
            toast('Bu ankete daha önce yanıt verdiniz. Mevcut yanıtınız korunuyor.', 'warn');
            disableForm(); return;
          }
          toast('Yanıtınız kaydedildi. Teşekkürler!', 'ok');
          disableForm();
        }catch(e){
          toast('İnternet/servis hatası: ' + e.message, 'err');
        }
      };
    }catch(e){
      toast('Hata: ' + e.message, 'err');
    }
  }

  loadForm();
  </script>
</body>
</html>

<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form seç</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;background:#0b1220;color:#e6e6e6;margin:0}
    .wrap{max-width:960px;margin:40px auto;padding:0 16px}
    h1{font-size:40px;margin:0 0 24px}
    .card{background:#111a2b;border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
    select,button{font-size:16px;border-radius:10px}
    select{width:100%;max-width:480px;background:#0d1424;color:#fff;border:1px solid #21304c;padding:12px 14px}
    button{background:#2f6feb;color:#fff;border:0;padding:12px 18px;cursor:pointer;margin-left:8px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .msg{margin-top:10px;opacity:.85}
    .error{color:#ffb3c1}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Form seç</h1>
    <div class="card">
      <p>Bu sayfada aktif formlar listelenir. Bir form seçince <code>form.html?slug=…</code> ile anket sayfasına gidilir.</p>
      <div class="row">
        <select id="sel" disabled><option>— Yükleniyor… —</option></select>
        <button id="open" disabled>Formu aç</button>
        <button id="copy" disabled>Bağlantıyı kopyala</button>
      </div>
      <div id="msg" class="msg"></div>
    </div>
  </div>

  <!-- index.js bu element ID'lerini bekliyor -->
  <script src="/index.js" defer></script>
</body>
</html>

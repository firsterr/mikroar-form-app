<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sonuçlar</title>
  <style>
    body{font:16px/1.4 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#0b1320;color:#e6edf6;margin:0}
    .wrap{max-width:1200px;margin:32px auto;padding:0 16px}
    h1{font-size:40px;margin:0 0 16px}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    input[type=text]{background:#0f1b2d;border:1px solid #2a3551;color:#e6edf6;border-radius:12px;padding:12px 14px;min-width:280px}
    button{background:#2e63ff;border:0;color:#fff;padding:12px 16px;border-radius:12px;cursor:pointer}
    button[disabled]{opacity:.45;cursor:not-allowed}
    .badge{background:#0f1b2d;border:1px solid #2a3551;color:#b7c4e2;padding:10px 12px;border-radius:999px}
    .pill{background:#0f1b2d;border:1px solid #2a3551;color:#b7c4e2;padding:8px 10px;border-radius:999px}
    .spacer{flex:1}
    .table-wrap{margin-top:16px;border:1px solid #2a3551;border-radius:16px;overflow:auto;background:#0f1b2d}
    table{width:100%;border-collapse:collapse;min-width:800px}
    th,td{border-bottom:1px solid #1e2a46;padding:12px 14px;vertical-align:top}
    th{position:sticky;top:0;background:#0f1b2d;font-weight:700}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Sonuçlar</h1>

    <div class="row">
      <input id="slug" type="text" placeholder="slug (örn: 807612)" />
      <button id="btnLoad">Yükle</button>
      <span id="badgeMeta" class="badge">kayıt: 0, sütun: 0</span>
      <div class="spacer"></div>
      <button id="btnCopy" disabled>Kopyala (TSV)</button>
      <button id="btnCsv" disabled>CSV indir</button>
    </div>

    <div class="row" style="margin-top:12px">
      <span id="badgeTitle" class="pill"></span>
      <span id="badgeActive" class="pill"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <!-- ÖNEMLİ: defer -->
  <script src="results.js" defer></script>
</body>
</html>

<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sonuçlar</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .wrap{max-width:1100px;margin:40px auto;padding:0 16px}
    .bar{display:flex;gap:12px;align-items:center;margin:16px 0}
    #slug{flex:0 0 280px}
    #table{width:100%;border-collapse:collapse;margin-top:12px}
    #table th,#table td{border:1px solid #2c3440;padding:8px;text-align:left}
    #toast{display:none;margin-top:12px;padding:8px;border:1px solid var(--line);border-radius:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Sonuçlar</h1>
    <div class="bar">
      <input id="slug" placeholder="ör. formayvalik" />
      <button id="btnLoad">Yükle</button>
      <button id="btnCopy">Kopyala (TSV)</button>
      <button id="btnCsv">CSV indir</button>
    </div>
    <div id="meta"></div>
    <table id="table"></table>
    <div id="toast"></div>
  </div>
  <!-- cache temiz olsun diye versiyon parametresi -->
  <script src="results.js?v=2"></script>
</body>
</html>
